name: Weekly Company Data Pull

on:
  schedule:
    # Every Monday at 09:00 UTC (17:00 Singapore time)
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  pull-company-data:
    runs-on: ubuntu-latest

    env:
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
      OPENFIGI_API_KEY: ${{ secrets.OPENFIGI_API_KEY }}
      EODHD_API_KEY: ${{ secrets.EODHD_API_KEY_DEMO }}

    steps:
      # 1. Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install requests python-dotenv

      # 4a. EDGAR 8-K — filing events
      - name: Run edgar_8k_pull.py
        continue-on-error: true
        run: |
          python edgar_8k_pull.py --tickers AAPL,MSFT,D05,HSBA,7203 \
            --max-filings 20 --out edgar_8k_results.csv

      # 4b. EDGAR XBRL — US financial data (revenue, net income, employees)
      - name: Run edgar_xbrl_pull.py
        continue-on-error: true
        run: |
          python edgar_xbrl_pull.py --tickers AAPL,MSFT \
            --out edgar_xbrl_results.csv

      # 4c. EODHD — primary source for Layer 3 profile + Layer 4 global financials
      #     Demo key limitation: only AAPL.US accessible without paid key.
      #     Replace --apikey demo with --env once paid key is added to secrets.
      - name: Run eodhd_pull.py
        continue-on-error: true
        run: |
          python eodhd_pull.py \
            --tickers AAPL.US \
            --apikey demo --out eodhd_results.csv

      # 4d. GLEIF — LEI identity + Level 2 parent relationships + trust signals
      - name: Run gleif_pull.py
        continue-on-error: true
        run: |
          python gleif_pull.py \
            --companies "Apple Inc,Microsoft Corporation,DBS Group Holdings,HSBC Holdings,Toyota Motor" \
            --out gleif_results.csv

      # 4e-pre. Extract ISINs from upstream CSVs for OpenFIGI lookup
      #     Collects non-empty ISIN values from EDGAR and GLEIF outputs,
      #     deduplicates, and writes one ISIN per line to isins_for_figi.txt.
      #     Falls back gracefully if upstream CSVs are missing or have no ISINs.
      - name: Extract ISINs from upstream outputs
        run: |
          python - << 'PYEOF'
          import csv, pathlib

          sources = ["edgar_8k_results.csv", "gleif_results.csv", "eodhd_results.csv"]
          isins = set()
          for src in sources:
              p = pathlib.Path(src)
              if not p.exists():
                  print(f"  [SKIP] {src} not found")
                  continue
              with open(p, newline="", encoding="utf-8") as f:
                  reader = csv.DictReader(f)
                  if "isin" not in (reader.fieldnames or []):
                      print(f"  [SKIP] {src} has no isin column")
                      continue
                  for row in reader:
                      val = row.get("isin", "").strip()
                      if val and len(val) == 12:   # basic ISIN format check
                          isins.add(val)

          out = pathlib.Path("isins_for_figi.txt")
          if isins:
              out.write_text("\n".join(sorted(isins)) + "\n")
              print(f"  Wrote {len(isins)} unique ISIN(s) to {out}")
          else:
              # Write empty file so the next step does not error on missing file
              out.write_text("")
              print("  [WARN] No ISINs found in upstream outputs — isins_for_figi.txt is empty")
          PYEOF

      # 4e. OpenFIGI — ISIN → compositeFIGI mapping (v3 API, dynamic input)
      #     Input: isins_for_figi.txt built from upstream EDGAR / GLEIF / EODHD outputs.
      #     Automatically stays in sync with watchlist — no hardcoded ISINs.
      #     Skipped gracefully if no ISINs were found upstream (continue-on-error: true).
      #     API key optional but recommended (raises rate limit to 25 req/6s).
      - name: Run openfigi_pull.py
        continue-on-error: true
        run: |
          python openfigi_pull.py \
            --file isins_for_figi.txt \
            --id-type ID_ISIN \
            --env --out openfigi_results.csv

      # 4f. Wikidata — auxiliary source for founded_year only
      #     Note: website and ticker now come from EODHD (higher quality).
      #     Wikidata retained because it is the only free source for founded_year.
      #     continue-on-error: Wikidata occasionally returns 502/503.
      - name: Run wikidata_pull.py
        continue-on-error: true
        run: |
          python wikidata_pull.py \
            --companies "Apple Inc,Microsoft Corporation,DBS Group,HSBC Holdings,Toyota Motor" \
            --out wikidata_results.csv

      # 5. Merge all outputs into entity-centric profiles + filing table
      - name: Run merge_v2.py
        run: |
          python merge_v2.py \
            --inputs edgar_8k_results.csv edgar_xbrl_results.csv \
                     eodhd_results.csv \
                     gleif_results.csv openfigi_results.csv wikidata_results.csv \
            --profiles merged_profiles.csv \
            --filings merged_filings.csv

      # 6. Upload all outputs as downloadable Artifacts (kept 30 days)
      - name: Upload merged profiles
        uses: actions/upload-artifact@v4
        with:
          name: merged-profiles-${{ github.run_id }}
          path: merged_profiles.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Upload merged filings
        uses: actions/upload-artifact@v4
        with:
          name: merged-filings-${{ github.run_id }}
          path: merged_filings.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Upload individual source CSVs
        uses: actions/upload-artifact@v4
        with:
          name: source-csvs-${{ github.run_id }}
          path: |
            edgar_8k_results.csv
            edgar_xbrl_results.csv
            eodhd_results.csv
            gleif_results.csv
            openfigi_results.csv
            wikidata_results.csv
          retention-days: 30
          if-no-files-found: warn
