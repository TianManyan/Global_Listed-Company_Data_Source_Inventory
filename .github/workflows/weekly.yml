name: Weekly Company Data Pull

on:
  schedule:
    # Every Monday at 09:00 UTC (17:00 Singapore time)
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  pull-company-data:
    runs-on: ubuntu-latest

    env:
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
      OPENFIGI_API_KEY: ${{ secrets.OPENFIGI_API_KEY }}

    steps:
      # 1. Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install requests python-dotenv

      # 4a. EDGAR 8-K — reads watchlist.csv
      - name: Run edgar_8k_pull.py
        run: |
          python edgar_8k_pull.py --tickers AAPL,MSFT,D05,HSBA,7203 \
            --max-filings 20 --out edgar_8k_results.csv

      # 4b. EDGAR XBRL — financial data for same tickers
      - name: Run edgar_xbrl_pull.py
        run: |
          python edgar_xbrl_pull.py --tickers AAPL,MSFT \
            --out edgar_xbrl_results.csv

      # 4c. GLEIF — Level 1 identity + Level 2 parent relationships
      - name: Run gleif_pull.py
        run: |
          python gleif_pull.py \
            --companies "Apple Inc,Microsoft Corporation,DBS Group Holdings,HSBC Holdings,Toyota Motor" \
            --out gleif_results.csv

      # 4d. OpenFIGI — identifier mapping (ticker → FIGI + ISIN)
      - name: Run openfigi_pull.py
        run: |
          python openfigi_pull.py \
            --tickers AAPL,MSFT,SP:D05,LN:HSBA \
            --env --out openfigi_results.csv

      # 4e. Wikidata — founded_year, website, ticker enrichment
      - name: Run wikidata_pull.py
        run: |
          python wikidata_pull.py \
            --companies "Apple Inc,Microsoft Corporation,DBS Group,HSBC Holdings,Toyota Motor" \
            --out wikidata_results.csv

      # 5. Merge all outputs into entity-centric profiles + filing table
      - name: Run merge_v2.py
        run: |
          python merge_v2.py \
            --inputs edgar_8k_results.csv edgar_xbrl_results.csv \
                     gleif_results.csv openfigi_results.csv wikidata_results.csv \
            --profiles merged_profiles.csv \
            --filings merged_filings.csv

      # 6. Upload all outputs as downloadable Artifacts (kept 30 days)
      - name: Upload merged profiles
        uses: actions/upload-artifact@v4
        with:
          name: merged-profiles-${{ github.run_id }}
          path: merged_profiles.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Upload merged filings
        uses: actions/upload-artifact@v4
        with:
          name: merged-filings-${{ github.run_id }}
          path: merged_filings.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Upload individual source CSVs
        uses: actions/upload-artifact@v4
        with:
          name: source-csvs-${{ github.run_id }}
          path: |
            edgar_8k_results.csv
            edgar_xbrl_results.csv
            gleif_results.csv
            openfigi_results.csv
            wikidata_results.csv
          retention-days: 30
          if-no-files-found: warn
